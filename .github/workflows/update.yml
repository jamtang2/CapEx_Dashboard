name: Weekly CapEx Update

on:
  schedule:
    - cron: '0 0 * * 6'   # 토요일 09:00 KST (UTC 기준 금요일 00:00)
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: M1 — 공시 수집 (collector)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python -m src.collector

      - name: M2 — 필드 추출 (extractor)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.extractor

      - name: M3 — 분류 (classifier)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.classifier

      - name: M4 — 재무정보 조회 (financials)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python -m src.financials

      - name: M5 — 정정 머징 (merger)
        run: python -m src.merger

      - name: M6 — 캘린더 빌드 (builder)
        run: python -m src.builder

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/capex.json data/calendar.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: weekly CapEx update $(date -u +'%Y-%m-%d')"
            git push
          fi
